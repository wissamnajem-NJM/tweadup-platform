<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formations - Tweadup</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container" id="navbar-container"></div>
    <div class="mobile-menu" id="mobile-menu"></div>
  </nav>

  <div class="container" style="padding-top:2rem;padding-bottom:4rem">
    <h1 class="page-title">Nos Formations</h1>
    <p class="page-subtitle">30 formations professionnelles dans 4 domaines d'excellence.</p>

    <!-- Filtres -->
    <div class="tabs-header" style="margin-bottom:1.5rem">
      <button class="tab-header-btn active" onclick="filterFormations('all', this)">Toutes</button>
      <button class="tab-header-btn" onclick="filterFormations('Informatique & Developpement', this)">Informatique</button>
      <button class="tab-header-btn" onclick="filterFormations('Marketing Digital', this)">Marketing</button>
      <button class="tab-header-btn" onclick="filterFormations('Design & Creation', this)">Design</button>
      <button class="tab-header-btn" onclick="filterFormations('Business & Entrepreneuriat', this)">Business</button>
    </div>

    <div id="formations-grid" class="grid grid-4"></div>
  </div>

  <footer class="footer" id="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    let currentFilter = 'all';

    function renderFormations(filter) {
      const grid = document.getElementById('formations-grid');
      let formations = FORMATIONS;
      if (filter && filter !== 'all') {
        formations = FORMATIONS.filter(f => f.domaine === filter);
      }

      // Check URL param
      const params = new URLSearchParams(window.location.search);
      const domaineParam = params.get('domaine');
      if (domaineParam && !filter) {
        formations = FORMATIONS.filter(f => f.domaine === domaineParam);
      }

      if (formations.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>Aucune formation trouvee</p></div>';
        return;
      }

      grid.innerHTML = formations.map(f => {
        const status = getInscriptionStatus(f.id);
        let statusBadge = '';
        if (status === 'en_attente') statusBadge = '<span class="badge" style="background:var(--warning-light);color:var(--warning)">En attente</span>';
        else if (status === 'acceptee') statusBadge = '<span class="badge" style="background:var(--success-light);color:var(--success)">Inscrit</span>';
        else if (status === 'refusee') statusBadge = '<span class="badge" style="background:var(--danger-light);color:var(--danger)">Refusee</span>';

        return `
        <div class="card" style="cursor:pointer" onclick="window.location.href='/formation.html?id=${f.id}'">
          <div class="card-img-wrap">
            <img src="${f.image}" alt="${f.titre}" class="card-img" loading="lazy">
            <span class="card-badge">${f.domaine}</span>
          </div>
          <div class="card-body">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem;margin-bottom:0.5rem">
              <h3 style="font-size:1rem;font-weight:600;color:var(--gray-900)">${f.titre}</h3>
              ${statusBadge}
            </div>
            <p style="font-size:0.875rem;color:var(--gray-500);margin-bottom:0.75rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${f.description}</p>
            <div style="display:flex;gap:1rem;font-size:0.75rem;color:var(--gray-500)">
              <span style="display:flex;align-items:center;gap:0.25rem"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${f.duree}</span>
              <span style="display:flex;align-items:center;gap:0.25rem"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> 10 cours</span>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    function filterFormations(domaine, btn) {
      currentFilter = domaine;
      document.querySelectorAll('.tab-header-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      renderFormations(domaine === 'all' ? null : domaine);
    }

    // Init
    const params = new URLSearchParams(window.location.search);
    const domaineParam = params.get('domaine');
    if (domaineParam) {
      document.querySelectorAll('.tab-header-btn').forEach(b => {
        if (b.textContent.includes(domaineParam.split(' ')[0])) b.classList.add('active');
        else b.classList.remove('active');
      });
      renderFormations(domaineParam);
    } else {
      renderFormations(null);
    }
  </script>
</body>
</html>
