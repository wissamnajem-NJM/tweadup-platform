<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Tweadup</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-container" id="navbar-container"></div>
    <div class="mobile-menu" id="mobile-menu"></div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        <h1>Connexion</h1>
        <p style="color:var(--gray-500);font-size:.875rem">Connectez-vous a votre compte</p>
      </div>
      <div id="alert-box"></div>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="email" required placeholder="votre@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input type="password" class="form-input" id="password" required placeholder="Votre mot de passe">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Se connecter</button>
      </form>
      <div class="auth-footer">
        <p>Pas encore de compte ? <a href="register.html">S'inscrire</a></p>
        <p><a href="">Retour a l'accueil</a></p>
      </div>
    </div>
  </div>

  <footer class="footer" id="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (redirectIfAuth());

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const alertBox = document.getElementById('alert-box');

      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = 'Connexion...';

      const result = await apiPost('/api/auth/login', { email, password });

      if (result && result.token) {
        setAuth(result.token, result.user);
        alertBox.innerHTML = '<div class="alert alert-success">Connexion reussie ! Redirection...</div>';
        setTimeout(() => {
          if (result.user.role === 'admin') window.location.href = '/admin.html';
          else window.location.href = '/dashboard.html';
        }, 500);
      } else {
        alertBox.innerHTML = '<div class="alert alert-danger">' + (result?.error || 'Email ou mot de passe incorrect') + '</div>';
        btn.disabled = false; btn.textContent = 'Se connecter';
      }
    });
  </script>
</body>
</html>
