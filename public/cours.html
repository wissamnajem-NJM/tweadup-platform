<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cours - Tweadup</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</head>
<body>
  <div class="navbar" id="navbar"></div>

  <div id="content"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const coursId = params.get('id');
    const formationId = coursId ? coursId.split('_')[0] : null;
    const formation = FORMATIONS.find(f => f.id === formationId);
    const allCours = formation ? getCours(formationId) : [];
    const cours = allCours.find(c => c.id === coursId);
    const coursIndex = allCours.findIndex(c => c.id === coursId);
    const isLastCours = coursIndex === allCours.length - 1;
    const user = getUser();

    if (!cours || !formation) {
      document.getElementById('content').innerHTML = `
        <div class="container" style="padding:3rem 0;text-align:center;">
          <h1>Cours non trouve</h1>
          <a href="formations.html" class="btn btn-primary mt-4">Retour</a>
        </div>`;
    } else {
      const prog = user ? getProgression(user.id, formationId, coursId) : null;
      let coursTermine = prog && prog.statut === 'termine';
      let quizSubmitted = prog && prog.quiz_reussi;
      let quizScore = prog ? prog.score_quiz : 0;

      const questions = getQuestions(coursId, formationId);
      let quizAnswers = {};

      renderPage();

      function renderPage() {
        document.getElementById('content').innerHTML = `
          <!-- Header sticky -->
          <div class="cours-header">
            <div class="container cours-header-inner">
              <div style="display:flex;align-items:center;gap:1rem;">
                <button onclick="history.back()" class="btn btn-outline btn-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                </button>
                <div>
                  <p style="font-size:0.75rem;color:var(--gray-500);">${formation.titre}</p>
                  <h1 style="font-size:1.125rem;font-weight:600;">${cours.titre}</h1>
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:0.75rem;">
                <span style="font-size:0.875rem;color:var(--gray-500);">${coursIndex + 1}/${allCours.length}</span>
                <div class="progress-bar" style="width:100px;">
                  <div class="progress-fill" style="width:${((coursIndex + 1) / allCours.length) * 100}%"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="container" style="padding:1.5rem;">
            <!-- Tabs -->
            <div class="cours-tabs">
              <button class="tab-btn active" onclick="showTab('cours')" id="tabCours">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                Cours
              </button>
              <button class="tab-btn" onclick="showTab('quiz')" id="tabQuiz" ${!coursTermine ? 'disabled' : ''}>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
                Quiz (${questions.length} questions)
              </button>
            </div>

            <!-- Contenu Cours -->
            <div id="panelCours">
              <div class="card">
                <div class="card-body prose">
                  ${cours.contenu}
                </div>
                <div style="padding:1rem 1.5rem;border-top:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center;">
                  ${!coursTermine ? `
                    <button class="btn btn-success" onclick="marquerTermine()">
                      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                      Marquer comme termine
                    </button>
                  ` : `
                    <span class="status-accepted">
                      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                      Cours termine
                    </span>
                  `}

                  ${quizSubmitted && quizScore >= 70 && !isLastCours ? `
                    <a href="cours.html?id=${allCours[coursIndex + 1].id}" class="btn btn-primary">
                      Cours suivant &rarr;
                    </a>
                  ` : ''}
                  ${quizSubmitted && quizScore >= 70 && isLastCours ? `
                    <a href="examen.html?formation=${formationId}" class="btn btn-purple">
                      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                      Examen final
                    </a>
                  ` : ''}
                </div>
              </div>
            </div>

            <!-- Quiz -->
            <div id="panelQuiz" style="display:none;">
              ${!quizSubmitted ? renderQuizForm() : renderQuizResult()}
            </div>
          </div>
        `;
      }

      function renderQuizForm() {
        let html = `
          <div class="alert alert-info" style="margin-bottom:1.5rem;">
            Repondez aux ${questions.length} questions. Il faut 70% minimum pour valider et acceder au cours suivant.
          </div>
        `;

        questions.forEach((q, i) => {
          html += `<div class="card" style="margin-bottom:0.75rem;"><div class="card-body">`;
          html += `<h3 style="font-weight:600;margin-bottom:1rem;"><span style="color:var(--primary);">${i + 1}.</span> ${q.question}</h3>`;
          html += `<div style="display:flex;flex-direction:column;gap:0.5rem;">`;
          q.options.forEach((opt, j) => {
            html += `
              <label class="quiz-option" id="opt_${q.id}_${j}" onclick="selectAnswer('${q.id}', ${j})">
                <input type="radio" name="q_${q.id}" value="${j}" onchange="selectAnswer('${q.id}', ${j})" style="accent-color:var(--primary);">
                <span>${opt}</span>
              </label>
            `;
          });
          html += `</div></div></div>`;
        });

        html += `
          <div style="text-align:center;margin-top:2rem;">
            <button class="btn btn-primary btn-lg" onclick="submitQuiz()" id="btnSubmitQuiz" disabled>Valider le quiz</button>
          </div>
        `;
        return html;
      }

      function renderQuizResult() {
        const isSuccess = quizScore >= 70;
        return `
          <div class="card">
            <div class="card-body">
              <div class="examen-result ${isSuccess ? 'success' : 'fail'}">
                ${isSuccess ? `
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
                  <h2>Felicitations !</h2>
                  <p>Vous avez obtenu <strong>${quizScore}%</strong>. Vous pouvez passer au cours suivant.</p>
                ` : `
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                  <h2>Quiz non reussi</h2>
                  <p>Vous avez obtenu <strong>${quizScore}%</strong>. Il faut 70% minimum. Reessayez !</p>
                  <button class="btn btn-outline" onclick="resetQuiz()" style="margin-top:1rem;">Reessayer le quiz</button>
                `}

                ${isSuccess && !isLastCours ? `
                  <a href="cours.html?id=${allCours[coursIndex + 1].id}" class="btn btn-primary" style="margin-top:1rem;">Cours suivant &rarr;</a>
                ` : ''}
                ${isSuccess && isLastCours ? `
                  <a href="examen.html?formation=${formationId}" class="btn btn-purple" style="margin-top:1rem;">Passer l'examen final</a>
                ` : ''}
              </div>
            </div>
          </div>
        `;
      }

      window.showTab = function(tab) {
        document.getElementById('panelCours').style.display = tab === 'cours' ? 'block' : 'none';
        document.getElementById('panelQuiz').style.display = tab === 'quiz' ? 'block' : 'none';
        document.getElementById('tabCours').classList.toggle('active', tab === 'cours');
        document.getElementById('tabQuiz').classList.toggle('active', tab === 'quiz');
      };

      window.selectAnswer = function(qId, optIndex) {
        quizAnswers[qId] = optIndex;
        // Update visual
        questions.forEach(q => {
          q.options.forEach((_, j) => {
            const el = document.getElementById(`opt_${q.id}_${j}`);
            if (el) el.classList.remove('selected');
          });
        });
        const selected = document.getElementById(`opt_${qId}_${optIndex}`);
        if (selected) selected.classList.add('selected');

        document.getElementById('btnSubmitQuiz').disabled = Object.keys(quizAnswers).length < questions.length;
      };

      window.submitQuiz = function() {
        let correct = 0;
        questions.forEach(q => {
          const selectedIdx = quizAnswers[q.id];
          if (q.options[selectedIdx] === q.reponse_correcte) correct++;
        });
        quizScore = Math.round((correct / questions.length) * 100);
        quizSubmitted = true;

        if (user) {
          saveProgression(user.id, formationId, coursId, {
            statut: 'termine',
            quiz_reussi: quizScore >= 70,
            score_quiz: quizScore,
            date_completion: new Date().toISOString()
          });

          if (quizScore >= 70) {
            addNotification(user.id, 'Quiz reussi !', `Vous avez obtenu ${quizScore}% au quiz de "${cours.titre}".`, 'quiz');
          }
        }

        showTab('quiz');
        document.getElementById('panelQuiz').innerHTML = renderQuizResult();
      };

      window.resetQuiz = function() {
        quizAnswers = {};
        quizSubmitted = false;
        quizScore = 0;
        showTab('quiz');
        document.getElementById('panelQuiz').innerHTML = renderQuizForm();
      };

      window.marquerTermine = function() {
        if (!user) return;
        saveProgression(user.id, formationId, coursId, {
          statut: 'termine',
          quiz_reussi: false,
          date_completion: new Date().toISOString()
        });
        coursTermine = true;
        renderPage();
      };
    }
  </script>
</body>
</html>
