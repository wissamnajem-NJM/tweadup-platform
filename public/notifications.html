<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications - Tweadup</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</head>
<body>
  <div class="navbar" id="navbar"></div>

  <div class="container" style="padding: 3rem 1.5rem; max-width: 700px; margin: 0 auto;">
    <a href="dashboard.html" class="btn btn-outline btn-sm" style="margin-bottom: 1.5rem;">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Retour
    </a>

    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
      <h1 style="font-size: 1.875rem; font-weight: 700; display: flex; align-items: center; gap: 0.75rem;">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" color="var(--primary)"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        Mes notifications
      </h1>
      <button class="btn btn-outline btn-sm" onclick="markAllRead()" id="btnMarkAll">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Tout marquer comme lu
      </button>
    </div>

    <div class="card">
      <div id="notificationsList"></div>
    </div>
  </div>

  <script>
    if (!requireAuth()) {} else {
      renderNotifications();
    }

    function renderNotifications() {
      const user = getUser();
      const notifs = getLocalNotifications().filter(n => n.user_id === user.id);

      if (notifs.length === 0) {
        document.getElementById('notificationsList').innerHTML = `
          <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <p>Aucune notification.</p>
          </div>
        `;
        document.getElementById('btnMarkAll').style.display = 'none';
        return;
      }

      const typeIcons = {
        inscription: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" color="var(--primary)"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>',
        quiz: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" color="var(--success)"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>',
        examen: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" color="var(--warning)"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
        certificat: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" color="var(--purple)"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>'
      };

      document.getElementById('notificationsList').innerHTML = notifs.map(n => `
        <div class="notif-item ${!n.lu ? 'unread' : ''}" onclick="markRead('${n.id}')" id="notif_${n.id}">
          <div class="notif-icon">${typeIcons[n.type] || typeIcons.inscription}</div>
          <div class="notif-content">
            <div style="display: flex; align-items: center; gap: 0.5rem;">
              <h4>${n.titre}</h4>
              ${!n.lu ? '<span style="width: 8px; height: 8px; background: var(--primary); border-radius: 50%; flex-shrink: 0;"></span>' : ''}
            </div>
            <p>${n.message}</p>
            <time>${new Date(n.created_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' })}</time>
          </div>
        </div>
      `).join('');
    }

    function markRead(notifId) {
      const notifs = getLocalNotifications();
      const n = notifs.find(n => n.id === notifId);
      if (n) {
        n.lu = true;
        localStorage.setItem('notifications', JSON.stringify(notifs));
        const el = document.getElementById(`notif_${notifId}`);
        if (el) el.classList.remove('unread');
        renderNavbar();
      }
    }

    function markAllRead() {
      const user = getUser();
      const notifs = getLocalNotifications();
      notifs.forEach(n => {
        if (n.user_id === user.id) n.lu = true;
      });
      localStorage.setItem('notifications', JSON.stringify(notifs));
      renderNotifications();
      renderNavbar();
    }
  </script>
</body>
</html>
