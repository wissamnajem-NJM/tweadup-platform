<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications - Tweadup</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container" id="navbar-container"></div>
    <div class="mobile-menu" id="mobile-menu"></div>
  </nav>

  <div class="container" style="padding-top:2rem;padding-bottom:4rem;max-width:640px">
    <h1 class="page-title">Notifications</h1>
    <p class="page-subtitle">Vos notifications et alertes de la plateforme.</p>

    <div class="card">
      <div class="card-header">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        <h2>Toutes les notifications</h2>
      </div>
      <div id="notifications-list"></div>
    </div>
  </div>

  <footer class="footer" id="footer"></footer>

  <script src="/js/data.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth());

    async function loadNotifs() {
      const notifs = await loadNotifications();
      renderNotifs(notifs);
    }

    function renderNotifs(notifs) {
      const container = document.getElementById('notifications-list');

      if (!notifs || notifs.length === 0) {
        container.innerHTML = '<div class="empty-state" style="padding:2rem"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg><p>Aucune notification</p></div>';
        return;
      }

      container.innerHTML = notifs.map(n => {
        let icon = '';
        if (n.type === 'inscription') icon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>';
        else if (n.type === 'certificat') icon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>';
        else icon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>';

        return `
          <div class="notif-item ${n.lu ? '' : 'unread'}" onclick="markRead('${n.id}', this)">
            <div class="notif-icon" style="color:${n.type === 'certificat' ? 'var(--success)' : (n.type === 'inscription' ? 'var(--primary)' : 'var(--gray-500)')}">${icon}</div>
            <div class="notif-content">
              <h4>${n.titre}</h4>
              <p>${n.message}</p>
              <time>${new Date(n.created_at).toLocaleDateString('fr-FR')} ${new Date(n.created_at).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})}</time>
            </div>
          </div>
        `;
      }).join('');
    }

    async function markRead(id, el) {
      await apiPut('/api/notifications/' + id + '/lu', {});
      if (el) el.classList.remove('unread');
      // Refresh count
      const notifs = await apiGet('/api/notifications');
      if (notifs && Array.isArray(notifs)) {
        const unread = notifs.filter(n => !n.lu).length;
        localStorage.setItem('notifCount', unread);
        renderNavbar();
      }
    }

    loadNotifs();
  </script>
</body>
</html>
