<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formation - Tweadup</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</head>
<body>
  <div class="navbar" id="navbar"></div>

  <div id="content">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const formationId = params.get('id');
    const formation = FORMATIONS.find(f => f.id === formationId);
    const user = getUser();

    if (!formation) {
      document.getElementById('content').innerHTML = `
        <div class="container" style="padding:3rem 0;text-align:center;">
          <h1>Formation non trouvee</h1>
          <a href="formations.html" class="btn btn-primary mt-4">Retour au catalogue</a>
        </div>`;
    } else {
      const cours = getCours(formationId);
      const inscStatus = user ? getInscriptionStatus(user.id, formationId) : null;
      const progressions = user ? getLocalProgressions().filter(p => p.etudiant_id === user.id && p.formation_id === formationId) : [];
      const completedCount = progressions.filter(p => p.statut === 'termine' && p.quiz_reussi).length;
      const progressPercent = (completedCount / cours.length) * 100;

      let actionButtons = '';
      if (!user) {
        actionButtons = `<a href="login.html" class="btn btn-primary">Se connecter pour s'inscrire</a>`;
      } else if (user.role === 'etudiant') {
        if (!inscStatus) {
          actionButtons = `<button class="btn btn-primary" id="btnInscrire" onclick="demanderInsc()">Demander l'inscription</button>`;
        } else if (inscStatus === 'en_attente') {
          actionButtons = `<span class="status-pending">En attente de validation</span>`;
        } else if (inscStatus === 'acceptee') {
          actionButtons = `<span class="status-accepted">Inscription acceptee</span>`;
        } else if (inscStatus === 'refusee') {
          actionButtons = `<span class="status-refused">Demande refusee</span>`;
        }
      }

      // Build cours list
      let coursHTML = '';
      cours.forEach((c, index) => {
        let status = 'bloque';
        const prog = progressions.find(p => p.cours_id === c.id);

        if (inscStatus === 'acceptee') {
          if (prog && prog.statut === 'termine' && prog.quiz_reussi) {
            status = 'termine';
          } else if (prog && prog.statut === 'termine' && !prog.quiz_reussi) {
            status = 'quiz';
          } else if (index === 0) {
            status = 'accessible';
          } else {
            const prevProg = progressions.find(p => p.cours_id === cours[index - 1].id);
            if (prevProg && prevProg.statut === 'termine' && prevProg.quiz_reussi) status = 'accessible';
          }
        }

        let icon, badge, clickable = false;
        if (status === 'termine') {
          icon = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" color="var(--success)"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
          badge = '<span style="border:1px solid var(--success);color:var(--success);padding:0.125rem 0.5rem;border-radius:9999px;font-size:0.75rem;">Termine' + (prog.score_quiz ? ' (' + prog.score_quiz + '%)' : '') + '</span>';
          clickable = true;
        } else if (status === 'quiz') {
          icon = '<span style="background:var(--warning-light);color:var(--warning);" class="cours-number">' + (index + 1) + '</span>';
          badge = '<span style="border:1px solid var(--warning);color:var(--warning);padding:0.125rem 0.5rem;border-radius:9999px;font-size:0.75rem;">Quiz a faire</span>';
          clickable = true;
        } else if (status === 'accessible') {
          icon = '<span style="background:var(--primary-light);color:var(--primary);" class="cours-number">' + (index + 1) + '</span>';
          badge = '<span style="border:1px solid var(--primary);color:var(--primary);padding:0.125rem 0.5rem;border-radius:9999px;font-size:0.75rem;">Commencer</span>';
          clickable = true;
        } else {
          icon = '<span style="background:var(--gray-100);color:var(--gray-400);" class="cours-number"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>';
          badge = '';
        }

        const onClick = clickable ? `onclick="window.location.href='cours.html?id=${c.id}'" style="cursor:pointer;"` : '';

        coursHTML += `
          <div class="cours-item ${!clickable ? 'locked' : ''}" ${onClick}>
            ${icon}
            <div class="cours-info">
              <h4>${c.titre}</h4>
              <p>${c.duree}</p>
            </div>
            <div>${badge}</div>
          </div>
        `;
      });

      // Examen final button
      let examenHTML = '';
      if (inscStatus === 'acceptee' && completedCount === cours.length) {
        examenHTML = `
          <div class="card" style="margin-top:1.5rem;border:2px solid #c4b5fd;background:var(--purple-light);">
            <div class="card-body" style="text-align:center;">
              <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" color="var(--purple)" style="margin-bottom:1rem;"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              <h3 style="font-size:1.25rem;font-weight:700;color:#5b21b6;margin-bottom:0.5rem;">Examen Final disponible !</h3>
              <p style="color:#7c3aed;margin-bottom:1rem;">Felicitations ! Vous avez termine tous les cours. Passez l'examen final pour obtenir votre certificat.</p>
              <a href="examen.html?formation=${formation.id}" class="btn btn-purple">Passer l'examen final</a>
            </div>
          </div>
        `;
      }

      document.getElementById('content').innerHTML = `
        <!-- Header -->
        <div style="background:var(--white);border-bottom:1px solid var(--gray-200);">
          <div class="container" style="padding:2rem 1.5rem;">
            <div style="display:flex;gap:2rem;flex-wrap:wrap;">
              <div style="flex:0 0 300px;">
                <img src="${formation.image}" alt="${formation.titre}" style="width:100%;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);">
              </div>
              <div style="flex:1;min-width:300px;">
                <span class="badge" style="background:var(--gray-100);color:var(--gray-700);margin-bottom:0.75rem;">${formation.domaine}</span>
                <h1 style="font-size:2rem;font-weight:700;color:var(--gray-900);margin-bottom:0.75rem;">${formation.titre}</h1>
                <p style="color:var(--gray-600);margin-bottom:1rem;">${formation.description}</p>
                <div style="display:flex;gap:1.5rem;margin-bottom:1.5rem;font-size:0.875rem;color:var(--gray-500);">
                  <span><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${formation.duree}</span>
                  <span><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> ${formation.niveau}</span>
                  <span><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> ${formation.nombre_cours} cours</span>
                </div>
                <div id="actionButtons">${actionButtons}</div>
                <div id="inscMessage"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Cours -->
        <div class="container" style="padding:2rem 1.5rem;">
          <h2 style="font-size:1.5rem;font-weight:700;margin-bottom:1rem;">Programme de la formation</h2>

          ${inscStatus === 'acceptee' ? `
            <div style="margin-bottom:1.5rem;">
              <div style="display:flex;justify-content:space-between;font-size:0.875rem;margin-bottom:0.5rem;">
                <span>Progression</span>
                <span>${completedCount}/${cours.length} cours completes</span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" style="width:${progressPercent}%"></div>
              </div>
            </div>
          ` : ''}

          ${coursHTML}
          ${examenHTML}
        </div>
      `;
    }

    function demanderInsc() {
      const u = getUser();
      if (!u) { window.location.href = 'login.html'; return; }

      saveLocalInscription(u.id, formationId);

      // Notification admin
      addNotification('admin', 'Nouvelle demande d\'inscription', u.prenom + ' ' + u.nom + ' a demande l\'inscription a ' + formation.titre, 'inscription');

      document.getElementById('actionButtons').innerHTML = '<span class="status-pending">En attente de validation</span>';
      showAlert('inscMessage', 'Votre demande d\'inscription a ete envoyee. En attente de validation.', 'success');
    }
  </script>
</body>
</html>
