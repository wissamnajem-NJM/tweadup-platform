<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogue - Tweadup</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</head>
<body>
  <div class="navbar" id="navbar"></div>

  <section style="padding: 3rem 0;">
    <div class="container">
      <h1 class="page-title">Catalogue des formations</h1>
      <p class="page-subtitle">Decouvrez nos 30 formations professionnelles</p>

      <!-- Filtres -->
      <div class="card" style="margin-bottom: 2rem;">
        <div class="card-body">
          <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: end;">
            <div style="flex: 1; min-width: 200px;">
              <label class="form-label">Rechercher</label>
              <input type="text" class="form-input" id="searchInput" placeholder="Nom de formation...">
            </div>
            <div>
              <label class="form-label">Domaine</label>
              <select class="form-select" id="domaineFilter">
                <option value="">Tous</option>
              </select>
            </div>
            <div>
              <label class="form-label">Niveau</label>
              <select class="form-select" id="niveauFilter">
                <option value="">Tous</option>
                <option value="Debutant">Debutant</option>
                <option value="Intermediaire">Intermediaire</option>
                <option value="Avance">Avance</option>
              </select>
            </div>
            <button class="btn btn-outline" id="resetBtn" style="display:none;">Reinitialiser</button>
          </div>
        </div>
      </div>

      <div style="margin-bottom: 1rem; font-size: 0.875rem; color: var(--gray-500);">
        <span id="countResult">0</span> formation(s)
      </div>

      <div class="grid grid-3" id="formationsList"></div>

      <div id="emptyState" class="empty-state" style="display:none;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        <p>Aucune formation ne correspond a vos criteres.</p>
      </div>
    </div>
  </section>

  <script>
    // Remplir le select domaines
    const domaineSelect = document.getElementById('domaineFilter');
    DOMAINES.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d;
      opt.textContent = d;
      domaineSelect.appendChild(opt);
    });

    // URL params
    const urlParams = new URLSearchParams(window.location.search);
    const domaineParam = urlParams.get('domaine');
    if (domaineParam) domaineSelect.value = domaineParam;

    function renderFormations() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const domaine = document.getElementById('domaineFilter').value;
      const niveau = document.getElementById('niveauFilter').value;

      const filtered = FORMATIONS.filter(f => {
        const matchSearch = !search || f.titre.toLowerCase().includes(search) || f.description.toLowerCase().includes(search);
        const matchDomaine = !domaine || f.domaine === domaine;
        const matchNiveau = !niveau || f.niveau === niveau;
        return matchSearch && matchDomaine && matchNiveau;
      });

      document.getElementById('countResult').textContent = filtered.length;
      document.getElementById('formationsList').innerHTML = filtered.map(renderFormationCard).join('');
      document.getElementById('emptyState').style.display = filtered.length === 0 ? 'block' : 'none';
      document.getElementById('resetBtn').style.display = (search || domaine || niveau) ? 'inline-flex' : 'none';
    }

    document.getElementById('searchInput').addEventListener('input', renderFormations);
    document.getElementById('domaineFilter').addEventListener('change', renderFormations);
    document.getElementById('niveauFilter').addEventListener('change', renderFormations);
    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('searchInput').value = '';
      document.getElementById('domaineFilter').value = '';
      document.getElementById('niveauFilter').value = '';
      renderFormations();
    });

    renderFormations();
  </script>
</body>
</html>
