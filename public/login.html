<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Tweadup</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 1.66 4 3 6 3s6-1.34 6-3v-5"/></svg>
        </a>
        <h1>Connexion</h1>
      </div>

      <div id="alertBox"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="email" placeholder="votre@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input type="password" class="form-input" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Se connecter</button>
      </form>

      <div class="auth-footer">
        Pas encore de compte ? <a href="register.html">Creer un compte</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Admin - verification par hash SHA-256 (mot de passe jamais stocke en clair)
      if (email === 'admin@gmail.com' && (await verifyAdminPassword(password))) {
        setUser({ id: 'admin-fixed', email: 'admin@gmail.com', nom: 'Admin', prenom: 'Tweadup', role: 'admin' });
        window.location.href = 'admin.html';
        return;
      }

      // Login normal
      if (supabase) {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          showAlert('alertBox', error.message, 'danger');
          return;
        }
        if (data.user) {
          const { data: profile } = await supabase.from('profiles').select('*').eq('id', data.user.id).single();
          if (profile) setUser(profile);
        }
      } else {
        // Mode local sans Supabase
        const users = JSON.parse(localStorage.getItem('local_users') || '[]');
        const u = users.find(u => u.email === email && u.password === password);
        if (!u) {
          showAlert('alertBox', 'Email ou mot de passe incorrect.', 'danger');
          return;
        }
        setUser({ id: u.id, email: u.email, nom: u.nom, prenom: u.prenom, role: 'etudiant' });
      }

      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
