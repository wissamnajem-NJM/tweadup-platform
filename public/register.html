<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - Tweadup</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 1.66 4 3 6 3s6-1.34 6-3v-5"/></svg>
        </a>
        <h1>Creer un compte</h1>
      </div>

      <div id="alertBox"></div>

      <form id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Prenom</label>
            <input type="text" class="form-input" id="prenom" required>
          </div>
          <div class="form-group">
            <label class="form-label">Nom</label>
            <input type="text" class="form-input" id="nom" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="email" placeholder="votre@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input type="password" class="form-input" id="password" placeholder="Min. 6 caracteres" required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label">Confirmer le mot de passe</label>
          <input type="password" class="form-input" id="confirmPassword" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">S'inscrire</button>
      </form>

      <div class="auth-footer">
        Deja un compte ? <a href="login.html">Se connecter</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const prenom = document.getElementById('prenom').value;
      const nom = document.getElementById('nom').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (password !== confirm) {
        showAlert('alertBox', 'Les mots de passe ne correspondent pas.', 'danger');
        return;
      }

      if (supabase) {
        const { data, error } = await supabase.auth.signUp({
          email, password,
          options: { data: { nom, prenom, role: 'etudiant' } }
        });
        if (error) {
          showAlert('alertBox', error.message, 'danger');
          return;
        }
        showAlert('alertBox', 'Compte cree ! Connectez-vous.', 'success');
        setTimeout(() => window.location.href = 'login.html', 1500);
      } else {
        // Mode local
        const users = JSON.parse(localStorage.getItem('local_users') || '[]');
        if (users.find(u => u.email === email)) {
          showAlert('alertBox', 'Cet email est deja utilise.', 'danger');
          return;
        }
        users.push({ id: 'user_' + Date.now(), email, password, nom, prenom, role: 'etudiant' });
        localStorage.setItem('local_users', JSON.stringify(users));
        showAlert('alertBox', 'Compte cree avec succes !', 'success');
        setTimeout(() => window.location.href = 'login.html', 1500);
      }
    });
  </script>
</body>
</html>
