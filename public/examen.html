<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Examen Final - Tweadup</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</head>
<body>
  <div class="navbar" id="navbar"></div>

  <div id="content"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const formationId = params.get('formation');
    const formation = FORMATIONS.find(f => f.id === formationId);
    const user = getUser();

    if (!formation) {
      document.getElementById('content').innerHTML = `
        <div class="container" style="padding:3rem 0;text-align:center;">
          <h1>Formation non trouvee</h1>
          <a href="formations.html" class="btn btn-primary mt-4">Retour</a>
        </div>`;
    } else {
      const questions = getExamenQuestions(formationId);
      let answers = {};
      let submitted = false;
      let score = 0;
      let certificatGenere = false;

      renderExamen();

      function renderExamen() {
        if (!submitted) {
          let html = `
            <div class="cours-header">
              <div class="container cours-header-inner">
                <div style="display:flex;align-items:center;gap:1rem;">
                  <button onclick="window.location.href='formation.html?id=${formationId}'" class="btn btn-outline btn-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                  </button>
                  <div>
                    <p style="font-size:0.75rem;color:var(--gray-500);">Examen Final</p>
                    <h1 style="font-size:1.125rem;font-weight:600;">${formation.titre}</h1>
                  </div>
                </div>
                <span style="border:1px solid var(--gray-300);padding:0.25rem 0.75rem;border-radius:9999px;font-size:0.875rem;">${questions.length} questions</span>
              </div>
            </div>

            <div class="container" style="padding:1.5rem;">
              <div class="alert alert-info" style="margin-bottom:1.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:0.5rem;"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                Examen final de ${questions.length} questions. Vous devez obtenir au moins 70% pour recevoir votre certificat.
              </div>

              <div class="progress-bar" style="margin-bottom:2rem;">
                <div class="progress-fill purple" id="examenProgress" style="width:0%"></div>
              </div>
          `;

          questions.forEach((q, i) => {
            html += `<div class="card" style="margin-bottom:0.75rem;"><div class="card-body">`;
            html += `<h3 style="font-weight:600;margin-bottom:1rem;"><span style="color:var(--purple);">${i + 1}.</span> ${q.question}</h3>`;
            html += `<div style="display:flex;flex-direction:column;gap:0.5rem;">`;
            q.options.forEach((opt, j) => {
              html += `
                <label class="quiz-option" id="opt_${i}_${j}" onclick="selectAnswer(${i}, ${j})">
                  <input type="radio" name="q_${i}" value="${j}" onchange="selectAnswer(${i}, ${j})" style="accent-color:var(--purple);">
                  <span>${opt}</span>
                </label>
              `;
            });
            html += `</div></div></div>`;
          });

          html += `
              <div style="text-align:center;margin-top:2rem;">
                <button class="btn btn-purple btn-lg" onclick="submitExamen()" id="btnSubmit" disabled>Soumettre l'examen</button>
              </div>
            </div>
          `;
          document.getElementById('content').innerHTML = html;
        } else {
          renderResult();
        }
      }

      window.selectAnswer = function(qIndex, optIndex) {
        answers[qIndex] = optIndex;
        questions[qIndex].options.forEach((_, j) => {
          const el = document.getElementById(`opt_${qIndex}_${j}`);
          if (el) el.classList.remove('selected');
        });
        const sel = document.getElementById(`opt_${qIndex}_${optIndex}`);
        if (sel) sel.classList.add('selected');

        const progress = (Object.keys(answers).length / questions.length) * 100;
        const bar = document.getElementById('examenProgress');
        if (bar) bar.style.width = progress + '%';

        const btn = document.getElementById('btnSubmit');
        if (btn) btn.disabled = Object.keys(answers).length < questions.length;
      };

      window.submitExamen = function() {
        let correct = 0;
        questions.forEach((q, i) => {
          const idx = answers[i];
          if (idx !== undefined && q.options[idx] === q.reponse_correcte) correct++;
        });
        score = Math.round((correct / questions.length) * 100);
        submitted = true;

        if (user && score >= 70) {
          const numero = 'TW-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6).toUpperCase();
          saveCertificat(user.id, formationId, numero, score);
          certificatGenere = true;
          addNotification(user.id, 'Examen reussi - Certificat obtenu !', `Felicitations ! Vous avez obtenu ${score}% a l'examen de "${formation.titre}".`, 'certificat');
        } else if (user) {
          addNotification(user.id, 'Examen non reussi', `Vous avez obtenu ${score}%. Il faut 70% minimum.`, 'examen');
        }

        renderResult();
      };

      function renderResult() {
        const success = score >= 70;
        const cert = certificatGenere ? getLocalCertificats().find(c => c.etudiant_id === user.id && c.formation_id === formationId) : null;

        document.getElementById('content').innerHTML = `
          <div class="container" style="padding:3rem 1.5rem;max-width:800px;margin:0 auto;">
            <div class="card">
              <div class="card-body">
                <div class="examen-result ${success ? 'success' : 'fail'}">
                  ${success ? `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
                    <h2>Felicitations !</h2>
                    <p style="font-size:1.125rem;">Vous avez reussi l'examen avec <strong>${score}%</strong></p>
                    <p>Vous avez obtenu votre certificat de reussite !</p>

                    ${cert ? `
                      <div style="background:var(--white);border:2px solid #fde68a;border-radius:var(--radius-lg);padding:1.5rem;margin:1.5rem auto;max-width:400px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" color="#d97706" style="margin-bottom:0.75rem;"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
                        <h3 style="font-weight:700;margin-bottom:0.5rem;">Certificat de Reussite</h3>
                        <p style="font-size:0.875rem;color:var(--gray-600);"><strong>Formation :</strong> ${formation.titre}</p>
                        <p style="font-size:0.875rem;color:var(--gray-600);"><strong>Score :</strong> ${score}%</p>
                        <p style="font-size:0.875rem;color:var(--gray-600);"><strong>N&deg; :</strong> ${cert.numero}</p>
                        <button onclick="generateCertificatPDF({score_final:${score},formation_id:'${formationId}',numero:'${cert.numero}',date_obtention:'${cert.date_obtention}'})" class="btn btn-warning" style="margin-top:1rem;color:#1e3a5f;">
                          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                          Telecharger PDF
                        </button>
                      </div>
                    ` : ''}
                  ` : `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                    <h2>Examen non reussi</h2>
                    <p style="font-size:1.125rem;">Vous avez obtenu <strong>${score}%</strong></p>
                    <p>Il faut au moins 70% pour obtenir le certificat.</p>
                    <div style="display:flex;gap:1rem;justify-content:center;margin-top:1rem;flex-wrap:wrap;">
                      <button onclick="retryExamen()" class="btn btn-outline">Reessayer l'examen</button>
                      <a href="formation.html?id=${formationId}" class="btn btn-outline">Revoir les cours</a>
                    </div>
                  `}

                  <div style="display:flex;gap:1rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap;">
                    <a href="dashboard.html" class="btn btn-outline">Tableau de bord</a>
                    <a href="formations.html" class="btn btn-outline">Catalogue</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      window.retryExamen = function() {
        answers = {};
        submitted = false;
        score = 0;
        certificatGenere = false;
        renderExamen();
      };
    }
  </script>
</body>
</html>
