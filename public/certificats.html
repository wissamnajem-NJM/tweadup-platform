<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes certificats - Tweadup</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</head>
<body>
  <div class="navbar" id="navbar"></div>

  <div class="container" style="padding: 3rem 1.5rem; max-width: 900px; margin: 0 auto;">
    <a href="dashboard.html" class="btn btn-outline btn-sm" style="margin-bottom: 1.5rem;">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Retour
    </a>

    <h1 style="font-size: 1.875rem; font-weight: 700; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.75rem;">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" color="#d97706"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
      Mes certificats
    </h1>
    <p style="color: var(--gray-500); margin-bottom: 2rem;">Telechargez vos certificats de reussite</p>

    <div id="certificatsList"></div>
  </div>

  <script>
    if (!requireAuth()) {} else {
      const user = getUser();
      const certificats = getLocalCertificats().filter(c => c.etudiant_id === user.id);

      if (certificats.length === 0) {
        document.getElementById('certificatsList').innerHTML = `
          <div class="card">
            <div class="card-body" style="text-align: center; padding: 3rem;">
              <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" color="var(--gray-300)" style="margin-bottom: 1rem;"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
              <h2 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem;">Aucun certificat</h2>
              <p style="color: var(--gray-500); margin-bottom: 1.5rem;">Completez une formation et reussissez l'examen final pour en obtenir un.</p>
              <a href="formations.html" class="btn btn-primary">Explorer les formations</a>
            </div>
          </div>
        `;
      } else {
        document.getElementById('certificatsList').innerHTML = `
          <div class="grid grid-2">
            ${certificats.map(cert => {
              const formation = FORMATIONS.find(f => f.id === cert.formation_id);
              return `
                <div class="certificat-card">
                  <div style="display: flex; align-items: flex-start; gap: 1rem;">
                    <div class="certificat-icon">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
                    </div>
                    <div style="flex: 1;">
                      <h3 style="font-weight: 600; font-size: 1.125rem; margin-bottom: 0.25rem;">${formation ? formation.titre : 'Formation'}</h3>
                      <p style="font-size: 0.875rem; color: var(--gray-500); margin-bottom: 0.5rem;">N&deg; : ${cert.numero}</p>
                      <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem;">
                        <span class="badge" style="background: var(--success-light); color: #15803d;">Score: ${cert.score_final}%</span>
                        <span style="font-size: 0.875rem; color: var(--gray-500);">${new Date(cert.date_obtention).toLocaleDateString('fr-FR')}</span>
                      </div>
                      <button onclick="downloadCert('${cert.id}')" class="btn btn-warning btn-sm" id="btn_${cert.id}" style="color: #1e3a5f;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Telecharger PDF
                      </button>
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }
    }

    function downloadCert(certId) {
      const user = getUser();
      const cert = getLocalCertificats().find(c => c.id === certId && c.etudiant_id === user.id);
      if (cert) {
        generateCertificatPDF(cert);
      }
    }
  </script>
</body>
</html>
