<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formation - Tweadup</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container" id="navbar-container"></div>
    <div class="mobile-menu" id="mobile-menu"></div>
  </nav>

  <div class="container" style="padding-top:2rem;padding-bottom:4rem">
    <div id="formation-detail"></div>
  </div>

  <footer class="footer" id="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const formationId = params.get('id');
    if (!formationId) { window.location.href = '/formations.html'; }

    const formation = FORMATIONS.find(f => f.id === formationId);
    if (!formation) { window.location.href = '/formations.html'; }

    function renderFormation() {
      const container = document.getElementById('formation-detail');
      const status = getInscriptionStatus(formationId);
      const progress = getFormationProgress(formationId);
      const examenResult = getExamenResult(formationId);

      let actionButton = '';
      if (!isLoggedIn()) {
        actionButton = `<a href="login.html" class="btn btn-primary">Connectez-vous pour vous inscrire</a>`;
      } else if (!status) {
        actionButton = `<button class="btn btn-primary" onclick="inscrire()">Demander l'inscription</button>`;
      } else if (status === 'en_attente') {
        actionButton = `<span class="status-pending"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Inscription en attente de validation</span>`;
      } else if (status === 'refusee') {
        actionButton = `<span class="status-refused">Inscription refusee</span>`;
      } else if (status === 'acceptee') {
        if (examenResult && examenResult.reussi) {
          actionButton = `<span class="status-accepted">Formation terminee !</span>`;
        } else {
          actionButton = `<span class="status-accepted">Inscription acceptee</span>`;
        }
      }

      let examenSection = '';
      if (status === 'acceptee') {
        if (examenResult && examenResult.reussi) {
          examenSection = `
            <div class="alert alert-success" style="margin-top:1rem">
              <strong>Examen reussi !</strong> Score: ${examenResult.score}%<br>
              <a href="certificats.html" class="btn btn-sm btn-success" style="margin-top:0.5rem">Voir mon certificat</a>
            </div>`;
        } else if (canTakeExam(formationId)) {
          examenSection = `
            <div class="alert alert-info" style="margin-top:1rem">
              <strong>Bravo !</strong> Vous avez termine tous les cours. Vous pouvez passer l'examen final.<br>
              <a href="examen.html?formation=${formationId}" class="btn btn-sm btn-primary" style="margin-top:0.5rem">Passer l'examen final</a>
            </div>`;
        } else {
          examenSection = `
            <div style="margin-top:1rem">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
                <span style="font-size:0.875rem;font-weight:500">Progression</span>
                <span style="font-size:0.875rem;color:var(--gray-500)">${progress.completed}/${progress.total} cours</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" style="width:${progress.percent}%"></div></div>
              <p style="font-size:0.8125rem;color:var(--gray-500);margin-top:0.5rem">Completez tous les cours pour acceder a l'examen final.</p>
            </div>`;
        }
      }

      const cours = getLocalCours(formationId);
      const coursList = cours.map((c, idx) => {
        const isAccessible = status === 'acceptee' && isCoursAccessible(formationId, c.ordre);
        const isLocked = status !== 'acceptee' || !isAccessible;
        const prog = getCoursProgression(formationId, c.id);

        let numberClass = 'gray';
        if (prog.quiz_reussi) numberClass = 'green';
        else if (isAccessible && !isLocked) numberClass = 'blue';

        return `
        <div class="cours-item ${isLocked ? 'locked' : ''}" ${!isLocked ? `onclick="window.location.href='/cours.html?formation=${formationId}&cours=${c.id}'"` : ''}>
          <div class="cours-number ${numberClass}">${prog.quiz_reussi ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : c.ordre}</div>
          <div class="cours-info">
            <h4>${c.titre}</h4>
            <p>${isLocked ? (status === 'acceptee' ? 'Completez le cours precedent' : 'Inscription requise') : (prog.quiz_reussi ? 'Termine' : 'Cliquez pour commencer')}</p>
          </div>
          ${isLocked ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>' : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>'}
        </div>`;
      }).join('');

      container.innerHTML = `
        <div class="grid grid-2" style="gap:2rem;margin-bottom:2rem">
          <div>
            <span class="badge" style="background:var(--primary-light);color:var(--primary);margin-bottom:0.75rem;display:inline-block">${formation.domaine}</span>
            <h1 class="page-title">${formation.titre}</h1>
            <p style="color:var(--gray-500);margin-bottom:1rem">${formation.description}</p>
            <div style="display:flex;gap:1.5rem;font-size:0.875rem;color:var(--gray-600);margin-bottom:1.5rem">
              <span style="display:flex;align-items:center;gap:0.25rem"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${formation.duree}</span>
              <span style="display:flex;align-items:center;gap:0.25rem"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> ${formation.niveau}</span>
              <span style="display:flex;align-items:center;gap:0.25rem"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> 10 cours</span>
            </div>
            ${actionButton}
            ${examenSection}
          </div>
          <div>
            <img src="${formation.image}" alt="${formation.titre}" style="width:100%;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg)">
          </div>
        </div>

        <div class="card">
          <div class="card-header"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><h2>Programme - 10 cours</h2></div>
          <div class="card-body">${coursList}</div>
        </div>
      `;
    }

    async function inscrire() {
      const result = await apiPost('/api/inscriptions', { formation_id: formationId });
      if (result && result.id) {
        setLocalInscription({ formation_id: formationId, statut: 'en_attente' });
        renderFormation();
      } else if (result && result.error && result.error.includes('deja')) {
        setLocalInscription({ formation_id: formationId, statut: 'en_attente' });
        renderFormation();
      } else {
        // Fallback local
        setLocalInscription({ formation_id: formationId, statut: 'en_attente' });
        renderFormation();
      }
    }

    renderFormation();
  </script>
</body>
</html>
